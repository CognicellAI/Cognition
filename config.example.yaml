# Cognition Configuration File
#
# This file defines all available configuration options.
# Copy this file to .cognition/config.yaml and customize as needed.
#
# Configuration hierarchy (lowest to highest precedence):
#   1. Built-in defaults
#   2. ~/.cognition/config.yaml (global user preferences)
#   3. .cognition/config.yaml (project-level)
#   4. Environment variables / .env (highest precedence)
#
# Security note: Never commit API keys or secrets to this file.
# Use environment variables for secrets.

# Server settings
# Configure the HTTP server that serves the Cognition API.
server:
  host: 127.0.0.1
  port: 8000
  log_level: info

# Workspace settings
# Configure where projects/workspaces are stored.
workspace:
  root: .

# LLM (Language Model) settings
# Configure which AI model provider to use.
#
# On first startup, this section is seeded into the ConfigRegistry as a
# ProviderConfig entry (id="default", source="file", scope={}).
# Once an API-written provider exists, this section is ignored on restart.
#
# Supported providers: openai, anthropic, bedrock, openai_compatible,
#                      google_genai, google_vertexai
#
# Note: API keys should be set via environment variables:
#   OPENAI_API_KEY, ANTHROPIC_API_KEY, COGNITION_OPENAI_COMPATIBLE_API_KEY,
#   GOOGLE_API_KEY, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, etc.
#
# Optional fields:
#   base_url:    Override endpoint (required for openai_compatible)
#   api_key_env: Custom env var name for the API key (auto-inferred if omitted)
#   region:      AWS region (for bedrock)
#   role_arn:    IAM role ARN for cross-account Bedrock access
llm:
  provider: openai_compatible
  model: "google/gemini-3-flash-preview"
  base_url: "https://openrouter.ai/api/v1"
  # api_key_env: COGNITION_OPENAI_COMPATIBLE_API_KEY  # auto-inferred
  # region: us-east-1            # for bedrock
  # role_arn: arn:aws:iam::...   # for bedrock cross-account

# OpenAI-specific settings
openai:
  api_base: null

# OpenAI-compatible API settings (for self-hosted models)
openai_compatible:
  base_url: null

# AWS/Bedrock-specific settings
aws:
  region: "us-east-1"

# Bedrock model settings
bedrock:
  model_id: "anthropic.claude-3-sonnet-20240229-v1:0"

# Rate limiting settings
# Control API request throttling.
rate_limit:
  per_minute: 60
  burst: 10

# Observability settings
# Configure metrics, tracing, and monitoring.
# Note: Disabled by default to avoid port conflicts. Enable when you have
# Prometheus/Otel Collector running.
observability:
  otel_enabled: false
  otel_endpoint: null
  metrics_port: 9090

# Agent behavior settings
# Configure how the AI agent behaves and what capabilities it has.
# File-based resource sources are seeded into the ConfigRegistry at startup.
skill_sources:
  - ".cognition/skills/"

tool_sources:
  - ".cognition/tools/"

agent:
  memory:
    - "AGENTS.md"
  # Attached skill names. These must match skill names discovered from
  # configured skill_sources or created dynamically via the API.
  skills: []
  # Attached tool names. These must match tool names discovered from
  # configured tool_sources or created dynamically via the API.
  tools: []
  subagents: []
  interrupt_on: {}
  # Maximum recursion depth for the agent ReAct loop.
  # Each tool call + response counts as one cycle; 1000 allows ~500 tool call cycles.
  # Increase for very long-running tasks; decrease to enforce a hard cap.
  recursion_limit: null  # null = use COGNITION_AGENT_RECURSION_LIMIT (default: 1000)
  # Middleware configuration
  # Supports well-known upstream middleware names with parameters:
  #   - tool_retry: Exponential backoff on tool failure
  #     params: max_retries (default: 3), backoff_factor (default: 2.0)
  #   - tool_call_limit: Enforce per-tool and global call limits
  #     params: run_limit, thread_limit, per_tool_limits
  #   - pii: Detect and redact PII in messages
  #     params: pii_types (email, phone, credit_card, ip, ssn), strategy (redact, mask)
  #   - human_in_the_loop: Request human approval before tool execution
  #     params: approve_tools (list of tool names requiring approval)
  #
  # Examples:
  # middleware:
  #   - name: tool_retry
  #     max_retries: 3
  #     backoff_factor: 2.0
  #   - name: tool_call_limit
  #     run_limit: 20
  #   - name: pii
  #     pii_types: [email, phone]
  #     strategy: redact
  middleware: []

# Persistence settings
# Configure how session state is stored.
persistence:
  backend: sqlite
  uri: .cognition/state.db
